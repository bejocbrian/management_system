name: Deploy Frontend to Hostinger

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Frontend (Vite)
        working-directory: ./apps/web
        env:
          VITE_API_URL: https://maroon-eland-586562.hostingersite.com
        run: pnpm run build

      - name: Verify build output
        run: |
          ls -la ./apps/web/dist/
          test -f ./apps/web/dist/index.html || (echo "index.html missing!" && exit 1)

      - name: Deploy via SSH/SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.API_SSH_HOST }}
          username: ${{ secrets.API_SSH_USERNAME }}
          password: ${{ secrets.API_SSH_PASSWORD }}
          port: 65002
          source: "./apps/web/dist/*"
          target: "/home/${{ secrets.API_SSH_USERNAME }}/domains/powderblue-caterpillar-585125.hostingersite.com/public_html"
          strip_components: 3
          overwrite: true
